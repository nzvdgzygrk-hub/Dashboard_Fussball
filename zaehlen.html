<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSVg Material zählen</title>
<meta name="theme-color" content="#0b1020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Material">
<link rel="manifest" href="zaehlen-manifest.json">
<link rel="icon" href="icon-material.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-material.svg">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b1020;color:#f4f7fb;padding:16px}
.wrap{max-width:820px;margin:auto}
a.back{display:inline-block;color:#a9d0ff;text-decoration:none;margin-bottom:14px;font-size:18px}.box{background:#141b2d;border:1px solid #263247;border-radius:18px;padding:15px;margin-bottom:14px}
h1{font-size:24px;margin:0 0 8px}h2{font-size:22px;margin:0 0 10px}.hint{font-size:13px;color:#a9b3c7;margin:4px 0 12px;line-height:1.35}.row{display:grid;grid-template-columns:1fr 100px auto;gap:8px;align-items:center;background:#0f1628;border:1px solid #263247;border-radius:14px;padding:10px;margin:8px 0}
.row label{font-weight:bold}.row input[type=number],.add input,.name-add input{width:100%;padding:10px;border-radius:10px;border:1px solid #34415a;background:#0b1020;color:#f4f7fb;font-size:16px}
button{border:1px solid #3a4a67;background:#1c2944;color:#f4f7fb;border-radius:12px;padding:10px 12px;font-size:15px;cursor:pointer}button:active{transform:scale(.98)}button.danger{border-color:#7a2d2d;background:#3a1720}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.add,.name-add{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:12px}.count{font-weight:bold;margin:8px 0 10px}
ul{list-style:none;margin:0;padding:0}li.player{display:flex;gap:10px;align-items:center;background:#0f1628;border:1px solid #263247;border-radius:14px;padding:10px;margin:8px 0}li.player input{transform:scale(1.25)}li.player label{flex:1;font-weight:bold}li.player.done label{text-decoration:line-through;color:#a9b3c7}.smallbtn{padding:7px 10px;font-size:13px}footer{text-align:center;color:#a9b3c7;font-size:12px;margin-top:22px}@media(max-width:520px){.row{grid-template-columns:1fr 86px}.row button{grid-column:1/-1}.add,.name-add{grid-template-columns:1fr}button{width:100%}}
</style>
</head>
<body>
<div class="wrap">
<a class="back" href="index.html">‹ Zurück zum Dashboard</a>
<section class="box">
<h2>Material Anfang Saison</h2>
<p class="hint">Trikots, Bälle, Hütchen und neue Sachen zählen.</p>
<div id="material-list"></div>
<div class="add">
<input id="new-material" placeholder="Neues Material, z. B. Leibchen">
<button id="add-material-btn">Hinzufügen</button>
</div>
</section>
<section class="box">
<h2>Spieler abhaken nach Alphabet</h2>
<p class="hint">Nur Namen abhaken. Mit „Häkchen zurücksetzen“ bleibt die Namensliste erhalten.</p>
<p class="count" id="player-count">0 von 0 abgehakt.</p>
<ul id="player-list"></ul>
<div class="name-add">
<input id="new-player" placeholder="Neuen Spieler hinzufügen">
<button id="add-player-btn">Spieler hinzufügen</button>
</div>
<div class="actions">
<button id="reset-checks-btn">Nur Häkchen zurücksetzen</button>
<button id="reset-all-btn" class="danger">Alles lokal zurücksetzen</button>
</div>
</section>
<footer>Programmiert von F. Kaplan</footer>
</div>
<script>
const KEY='ssvg_material_zaehlen_v2';
const oldKey='ssvg_material_zaehlen_v1';
const defaultState={
  materials:[{name:'Trikots',count:0},{name:'Bälle',count:0},{name:'Hütchen',count:0}],
  players:['Ahmet Süslü','Aos Alnabelsi','Benjamin','David Weber','Efe Kaplan','Elias','Jannik Hähnel','Jonas Koromilas','Julian Hähnel','Kirill Braun','Malik Vaak','Mario','Paul Herholz','Piotrek','Semih Diner'],
  checks:{}
};
const $=id=>document.getElementById(id);
function clone(obj){return JSON.parse(JSON.stringify(obj))}
function load(){try{let raw=localStorage.getItem(KEY)||localStorage.getItem(oldKey);if(raw){const s=JSON.parse(raw);return {...clone(defaultState),...s,materials:Array.isArray(s.materials)?s.materials:clone(defaultState).materials,players:Array.isArray(s.players)?s.players:clone(defaultState).players,checks:s.checks||{}}}}catch(e){console.warn(e)}return clone(defaultState)}
function save(s){localStorage.setItem(KEY,JSON.stringify(s))}
function sortNames(arr){return [...new Set(arr.map(x=>String(x).trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'de',{sensitivity:'base'}))}
function renderMaterials(){const s=load();const list=$('material-list');list.innerHTML='';s.materials.forEach((m,i)=>{const row=document.createElement('div');row.className='row';const label=document.createElement('label');label.textContent=m.name;const input=document.createElement('input');input.type='number';input.min='0';input.step='1';input.value=Number(m.count||0);input.addEventListener('input',()=>{const next=load();next.materials[i].count=Number(input.value||0);save(next)});const del=document.createElement('button');del.className='danger';del.textContent='Löschen';del.addEventListener('click',()=>{const next=load();next.materials.splice(i,1);save(next);renderMaterials()});row.append(label,input,del);list.appendChild(row)})}
function renderPlayers(){const s=load();s.players=sortNames(s.players);save(s);const list=$('player-list');list.innerHTML='';let checked=0;s.players.forEach(name=>{if(s.checks[name])checked++;const li=document.createElement('li');li.className='player'+(s.checks[name]?' done':'');const cb=document.createElement('input');cb.type='checkbox';cb.checked=!!s.checks[name];cb.addEventListener('change',()=>{const next=load();next.checks[name]=cb.checked;save(next);renderPlayers()});const label=document.createElement('label');label.textContent=name;const del=document.createElement('button');del.className='danger smallbtn';del.textContent='Löschen';del.addEventListener('click',()=>{const next=load();next.players=next.players.filter(p=>p!==name);delete next.checks[name];save(next);renderPlayers()});li.append(cb,label,del);list.appendChild(li)});$('player-count').textContent=`${checked} von ${s.players.length} abgehakt.`}
function render(){renderMaterials();renderPlayers()}
$('add-material-btn').addEventListener('click',()=>{const input=$('new-material');const name=input.value.trim();if(!name)return;const s=load();if(!s.materials.some(m=>m.name.toLowerCase()===name.toLowerCase()))s.materials.push({name,count:0});save(s);input.value='';renderMaterials()});
$('new-material').addEventListener('keydown',e=>{if(e.key==='Enter')$('add-material-btn').click()});
$('add-player-btn').addEventListener('click',()=>{const input=$('new-player');const name=input.value.trim();if(!name)return;const s=load();s.players=sortNames([...s.players,name]);save(s);input.value='';renderPlayers()});
$('new-player').addEventListener('keydown',e=>{if(e.key==='Enter')$('add-player-btn').click()});
$('reset-checks-btn').addEventListener('click',()=>{if(!confirm('Nur die Spieler-Häkchen zurücksetzen?'))return;const s=load();s.checks={};save(s);renderPlayers()});
$('reset-all-btn').addEventListener('click',()=>{if(!confirm('Alles lokal zurücksetzen? Materialzahlen, neue Materialien und Spieleränderungen werden gelöscht.'))return;localStorage.removeItem(KEY);localStorage.removeItem(oldKey);render()});
render();
</script>
</body>
</html>
